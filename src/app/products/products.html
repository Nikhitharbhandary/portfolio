<app-header/>


<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-5 form_container mt-5 py-3">
            <div class="heading_container text-center">
                <h2 class="heading">Add product</h2>
            </div>
            <div class="form-group row">
                <label for="" class="col-4">Product Name : </label>
                <div class="col-8">
                    <input type="text" class="form-control" [(ngModel)]="product.name"  #nameinput name="name" id="">
                </div>
            </div>
             <div class="form-group row mt-3">
                <label for="" class="col-4">Product Price : </label>
                <div class="col-8">
                     <input type="text" class="form-control" [(ngModel)]="product.price" #priceinput name="price" id="">
                </div>
            </div>
            <div class="form-group d-flex justify-content-evenly py-2 mt-2 border-top">
                <button type="button" (click)="addProduct()" class="btn form_button">Save</button>
                <button type="reset" (click)="clearfunction()" class="btn form_button"> Clear</button>
                <button class="btn form_button" (click)="view_products()"> View Products</button>
                <button class="btn form_button" (click)="delete_product()"> Delete</button>
            </div>
        </div>
    </div>
</div>




<div class="form-group d-flex justify-content-center">

</div>

 <app-footer/>
