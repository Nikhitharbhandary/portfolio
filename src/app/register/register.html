<app-header/>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-5 form_container mt-5 py-3">
            <div class="heading_container text-center">
                <h2 class="heading">Sign Up</h2>
            </div>
            <div class="form-group row">
                <label for="" class="col-4">User Name : </label>
                <div class="col-8">
                    <input type="text" class="form-control" [(ngModel)]="user.username"  #nameinput name="name" id="">
                </div>
            </div>
             <div class="form-group row mt-3">
                <label for="" class="col-4">Password : </label>
                <div class="col-8">
                     <input type="text" class="form-control" [(ngModel)]="user.password" #passwordinput name="price" id="">
                </div>
            </div>
            <div class="form-group d-flex justify-content-evenly py-2 mt-2 border-top">
                <button type="button" (click)="register()" class="btn form_button">Register</button>
                <button type="reset" (click)="clearfunction()" class="btn form_button"> Clear</button>
            </div>
        </div>
    </div>
</div>
<app-footer/>
